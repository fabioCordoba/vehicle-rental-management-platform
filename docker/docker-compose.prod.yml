services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres-db:
    image: postgres:14.3
    container_name: vehicle-rental-postgres-db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DEFAULT_DB}
      POSTGRES_USER:     ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWD}
    networks:
      - vehicle-rental-network
    volumes:
      - dbvehicle-rental-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${POSTGRES_DEFAULT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Database init — ensures all DBs exist even with a pre-existing volume ──
  db-init:
    image: postgres:14.3
    container_name: vehicle-rental-db-init
    restart: "no"
    environment:
      PGPASSWORD: ${DATABASE_PASSWD}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - vehicle-rental-network
    command: >
      sh -c "
        psql -h postgres-db -U ${DATABASE_USER} -d postgres -c 'CREATE DATABASE authentication_db;' 2>/dev/null || true &&
        psql -h postgres-db -U ${DATABASE_USER} -d postgres -c 'CREATE DATABASE vehicles_db;'       2>/dev/null || true &&
        psql -h postgres-db -U ${DATABASE_USER} -d postgres -c 'CREATE DATABASE operation_db;'      2>/dev/null || true &&
        echo 'db-init done'
      "

  # ── Authentication microservice ───────────────────────────────────────────
  authentication-service:
    image: fabiocordobadev/personal-authentication:latest
    container_name: vehicle-rental-authentication
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:8000"
    environment:
      DEBUG:                "False"
      SECRET_KEY:           ${AUTH_SECRET_KEY}
      DB_ENGINE:            django.db.backends.postgresql
      DB_HOST:              ${DATABASE_HOST}
      DB_USER:              ${DATABASE_USER}
      DB_PASSWORD:          ${DATABASE_PASSWD}
      DB_NAME:              ${AUTH_DB_NAME}
      DB_PORT:              "5432"
      ALLOWED_HOSTS:        "${ALLOWED_HOSTS},localhost,127.0.0.1,authentication-service"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - vehicle-rental-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Vehicle microservice ──────────────────────────────────────────────────
  vehicle-service:
    image: fabiocordobadev/personal-vehicle:latest
    container_name: vehicle-rental-vehicle
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:8000"
    environment:
      DEBUG:                "False"
      SECRET_KEY:           ${VEHICLE_SECRET_KEY}
      DB_ENGINE:            django.db.backends.postgresql
      DB_HOST:              ${DATABASE_HOST}
      DB_USER:              ${DATABASE_USER}
      DB_PASSWORD:          ${DATABASE_PASSWD}
      DB_NAME:              ${VEHICLES_DB_NAME}
      DB_PORT:              "5432"
      ALLOWED_HOSTS:        "${ALLOWED_HOSTS},localhost,127.0.0.1,vehicle-service"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - vehicle-rental-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Operation microservice ────────────────────────────────────────────────
  operation-service:
    image: fabiocordobadev/personal-operation:latest
    container_name: vehicle-rental-operation
    restart: unless-stopped
    ports:
      - "127.0.0.1:9002:8000"
    environment:
      DEBUG:                "False"
      SECRET_KEY:           ${OPERATION_SECRET_KEY}
      DB_ENGINE:            django.db.backends.postgresql
      DB_HOST:              ${DATABASE_HOST}
      DB_USER:              ${DATABASE_USER}
      DB_PASSWORD:          ${DATABASE_PASSWD}
      DB_NAME:              ${OPERATION_DB_NAME}
      DB_PORT:              "5432"
      ALLOWED_HOSTS:        "${ALLOWED_HOSTS},localhost,127.0.0.1,operation-service"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      VEHICLE_SERVICE_URL:  "http://vehicle-service:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      vehicle-service:
        condition: service_healthy
    networks:
      - vehicle-rental-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-service:
    image: fabiocordobadev/personal-frontend:latest
    container_name: vehicle-rental-frontend
    restart: unless-stopped
    networks:
      - vehicle-rental-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ── Nginx API Gateway — Certbot gestiona SSL en el servidor ─────────────
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: vehicle-rental-gateway
    restart: unless-stopped
    ports:
      - "8035:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.prod:/etc/nginx/conf.d:ro
    depends_on:
      authentication-service:
        condition: service_healthy
      vehicle-service:
        condition: service_healthy
      operation-service:
        condition: service_healthy
      frontend-service:
        condition: service_started
    networks:
      - vehicle-rental-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M


networks:
  vehicle-rental-network:
    driver: bridge

volumes:
  dbvehicle-rental-data:
