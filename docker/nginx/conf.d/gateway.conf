# ─── Upstream definitions ────────────────────────────────────────────────────

upstream authentication_service {
    server authentication-service:8000;
    keepalive 32;
}

upstream vehicle_service {
    server vehicle-service:8000;
    keepalive 32;
}

upstream operation_service {
    server operation-service:8000;
    keepalive 32;
}

upstream frontend_service {
    server frontend-service:80;
    keepalive 16;
}

# ─── Shared proxy settings ───────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── API Gateway — port 80 ───────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # Proxy common headers
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        $connection_upgrade;
    proxy_read_timeout  90s;
    proxy_connect_timeout 10s;

    # ── Authentication microservice ──────────────────────────────────────────
    location /api/authentication/ {
        proxy_pass http://authentication_service;
    }

    location /api/users/ {
        proxy_pass http://authentication_service;
    }

    # ── Vehicle microservice ─────────────────────────────────────────────────
    location /api/transports/ {
        proxy_pass http://vehicle_service;
    }

    # ── Operation microservice ───────────────────────────────────────────────
    location /api/procedures/ {
        proxy_pass http://operation_service;
    }

    # ── Swagger / OpenAPI docs per service ───────────────────────────────────
    location /docs/auth/ {
        rewrite ^/docs/auth/(.*)$ /$1 break;
        proxy_pass http://authentication_service;
    }

    location /docs/vehicle/ {
        rewrite ^/docs/vehicle/(.*)$ /$1 break;
        proxy_pass http://vehicle_service;
    }

    location /docs/operation/ {
        rewrite ^/docs/operation/(.*)$ /$1 break;
        proxy_pass http://operation_service;
    }

    # ── Gateway health check ─────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"vehicle-rental"}';
        add_header Content-Type application/json;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_service;
    }
}
